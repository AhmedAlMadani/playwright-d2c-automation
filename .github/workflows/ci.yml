name: CI – Playwright D2C Automation

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly regression run – every day at 00:00 UTC (03:00 local time)
    - cron: '0 0 * * *'

# Cancel in-progress runs on the same branch when a newer commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Architectural Upgrade: Parallel Execution ───────────────────────────────
# Tests now execute in full parallel using Playwright workers and matrix jobs.
# Data isolation is guaranteed via randomly generated user profiles per test.
# A global setup hook cleans the database once at the start of execution.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  typecheck:
    name: TypeScript – Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck

  smoke:
    name: Smoke Tests (@smoke)
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ SUPABASE_URL or SUPABASE_ANON_KEY is not configured."
            echo "   Go to: Settings → Secrets and variables → Actions"
            echo "   Add:   SUPABASE_URL  and  SUPABASE_ANON_KEY"
            exit 1
          fi
          echo "✅ Supabase secrets are present."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=chromium --grep @smoke
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CI: true

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  regression:
    name: Regression Tests (@regression) – ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ SUPABASE_URL or SUPABASE_ANON_KEY is not configured."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run regression – ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }} --grep @regression
        env:
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.API_URL || 'http://localhost:3001' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CI: true

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.browser }}-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-traces-${{ matrix.browser }}-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: typecheck
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ SUPABASE_URL or SUPABASE_ANON_KEY is not configured."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: npx playwright test src/tests/api --project=chromium
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CI: true

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  advanced-tests:
    name: Advanced Subscription Tests (@advanced)
    runs-on: ubuntu-latest
    needs: typecheck
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "❌ SUPABASE_URL or SUPABASE_ANON_KEY is not configured."
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run advanced subscription tests
        run: npx playwright test src/tests/advanced --project=chromium
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CI: true

      - name: Upload advanced test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advanced-test-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14
